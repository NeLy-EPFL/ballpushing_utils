name: tests

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref (e.g. a follow-up push to a PR).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ballpushing_utils with dev extras
        run: |
          python -m pip install --upgrade pip
          # ``utils_behavior`` is a lab-internal package pulled in by the
          # top-level ``ballpushing_utils`` __init__; pyproject.toml names it
          # as a dependency but does not resolve it from PyPI, so install it
          # from GitHub first.
          pip install "utils_behavior @ git+https://github.com/NeLy-EPFL/utils_behavior"
          pip install -e ".[dev]"

      - name: Run unit tests
        # ``tests/unit`` contains the hermetic suite (diagnostics stubs,
        # permutation-test reproducibility, plus the data-gated
        # initialization tests which skip cleanly without
        # BALLPUSHING_DATA_ROOT).
        run: pytest tests/unit -v
